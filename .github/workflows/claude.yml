name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # ボットの投稿による無限ループを防止
    if: github.actor != 'github-actions[bot]' && github.actor != 'copilot-pull-request-reviewer[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          disallowed_tools: "Edit,Write,Bash,computer"
          # pull_request イベントのみ自動レビュー。コメントイベントは @claude メンションで起動
          direct_prompt: ${{ github.event_name == 'pull_request' && 'Please review this pull request following the guidelines in CLAUDE.md.' || '' }}
